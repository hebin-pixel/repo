<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S파트 과업 체크리스트</title>
<style>
  :root{
    --bg:#FFFFFF; --card:#FFFFFF; --border:#E9E9E7; --text:#37352F; --text-sub:rgba(55,53,47,0.65);
    --hover:rgba(55,53,47,0.06);
    --accent:#2383E2;
    --success:#F28FB0; --success-strong:#E85D8C; --success-bg:#FDEAF1; --success-text:#B23B69;
    --prep-strong:#8D8B82; --prep-bg:#EDEBE1; --prep-text:#5F5D55;
    --qc-strong:#8177DA; --qc-bg:#E4E1FB; --qc-text:#4A3FA0;
    --after-strong:#4E86C9; --after-bg:#DCEBFA; --after-text:#2E5F94;
    --settle-strong:#C79233; --settle-bg:#F7E7C8; --settle-text:#8A5F17;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; padding:10px 12px 24px; background:var(--bg); color:var(--text);
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    line-height:1.5; font-size:14px;
  }
  .wrap{max-width:600px; margin:0 auto;}
  .page-header{ display:flex; align-items:center; gap:8px; margin:0 0 10px; }
  .page-title-input{
    flex:0 1 auto; width:auto; min-width:80px; font-size:15px; font-weight:600; border:none; background:transparent;
    color:var(--text); font-family:inherit; padding:2px 0; cursor:default;
  }
  .page-title-input:focus{ outline:none; }
  body.edit-mode .page-title-input{
    border:1px solid var(--border); border-radius:5px; background:var(--card); padding:4px 8px; cursor:text;
  }

  .task-form{ margin-bottom:8px; }
  .task-form input{
    padding:6px 10px; border:1px solid var(--border); border-radius:5px; font-size:13px;
    font-family:inherit; background:var(--card); color:var(--text); width:100%;
  }
  .task-form input:focus{ outline:none; border-color:var(--accent); }
  .task-form > input{ margin-bottom:6px; }
  .task-fields{ display:flex; flex-wrap:wrap; gap:6px 8px; }
  .task-field-row{ display:flex; flex-direction:column; flex:1 1 calc(50% - 4px); min-width:110px; }
  .field{ display:flex; flex-direction:column; gap:2px; flex:1; min-width:0; }
  .field-label{ font-size:10px; color:var(--text-sub); padding-left:1px; }

  .field-edit-row{ display:none; align-items:center; gap:6px; flex-wrap:wrap; margin-top:4px; cursor:grab; }
  .field-edit-row:active{ cursor:grabbing; }
  body.edit-mode .field-edit-row{ display:flex; }
  .field-edit-label{ flex:1; padding:4px 8px; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }
  .field-edit-type{ padding:4px 6px; font-size:11px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }
  .add-field-row{ display:none; align-items:center; gap:6px; margin-top:2px; }
  body.edit-mode .add-field-row{ display:flex; }
  .add-field-input{ flex:1; padding:5px 8px; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }

  .qc-assignees{ margin-bottom:2px; }
  .qc-header-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .qc-header-label{ font-size:11px; font-weight:600; color:var(--text-sub); }
  .qc-summary{ display:flex; flex-direction:column; gap:6px; cursor:pointer; padding:2px 0; position:relative; }
  .qc-summary-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .qc-summary-label{ font-size:11.5px; font-weight:700; color:var(--text); flex-shrink:0; width:66px; }
  .qc-summary-empty{ font-size:12px; color:var(--text-sub); }
  .qc-edit-hint{ position:absolute; top:2px; right:2px; font-size:10px; color:var(--text-sub); }
  .qc-mode-row{ margin-bottom:6px; }
  .qc-mode-label{ display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-sub); cursor:pointer; user-select:none; }
  .qc-mode-label input{ width:13px; height:13px; accent-color:var(--accent); cursor:pointer; }
  .qc-assignee-row{
    display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:4px;
    padding:6px 8px; background:var(--bg); border:1px solid var(--border); border-radius:5px;
  }
  .qc-cat-label{ font-size:11.5px; font-weight:600; flex-shrink:0; width:66px; color:var(--text-sub); }
  .chip-list{ display:flex; flex-wrap:wrap; gap:5px; }
  .chip{
    display:inline-flex; align-items:center; gap:2px; background:#EEEDFE; color:#3C3489;
    border-radius:20px; padding:3px 10px; font-size:11px; white-space:nowrap;
  }
  .chip button{ background:none; border:none; color:#3C3489; cursor:pointer; font-size:12px; padding:0 0 0 3px; margin-right:-6px; line-height:1.4; }
  .chip-input{
    border:none; background:transparent; font-size:12px; flex:1; min-width:90px; outline:none;
    font-family:inherit; color:var(--text); padding:2px 0;
  }

  .progress-wrap{ margin:10px 0 8px; }
  .progress-label{ display:flex; justify-content:space-between; font-size:11.5px; color:var(--text-sub); margin-bottom:4px; }
  .progress-bar{ height:6px; background:var(--hover); border-radius:4px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--accent); border-radius:4px; transition:width .2s; width:0%; }

  #completeBanner{
    display:none; text-align:center; background:var(--success-bg); color:var(--success-text);
    border:1px solid var(--success-strong); border-radius:6px; padding:8px 10px; font-size:13px;
    font-weight:600; margin-bottom:8px;
  }
  #completeBanner.show{ display:block; }

  .global-actions{ display:flex; align-items:center; margin-bottom:10px; justify-content:flex-end; }
  .global-btn-group{
    display:flex; align-items:center; gap:0; background:var(--card);
    border:1px solid var(--border); border-radius:14px; padding:0;
  }
  .icon-round-btn{
    width:24px; height:24px; border-radius:50%; background:none; border:none;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    color:var(--text-sub); font-size:13px; line-height:1; transition:background-color .15s, box-shadow .15s, color .15s;
  }
  .icon-round-btn .section-chev{ font-size:10px; line-height:1; }
  .icon-round-btn:hover{ background:var(--hover); }
  .icon-round-btn.active{ color:var(--text); box-shadow:inset 0 0 0 1px var(--text-sub); }
  .icon-btn{
    width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    border:none; border-radius:6px; background:none; font-size:14px; cursor:pointer;
    color:var(--text-sub); transition:background-color .15s, color .15s;
  }
  .icon-btn:hover{ background:var(--hover); }
  .icon-btn.active{ background:var(--hover); color:var(--text); box-shadow:inset 0 0 0 1px var(--text-sub); }

  .section{ background:var(--card); border:1px solid var(--border); border-radius:6px; margin-bottom:6px; overflow:hidden; transition:border-color .15s, background-color .15s; }

  .section-head{ display:flex; align-items:center; justify-content:space-between; padding:8px 10px; cursor:pointer; user-select:none; gap:8px; transition:background-color .15s; }
  .section-head:hover{ background:var(--hover); }
  .section-title{ display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; flex-wrap:wrap; min-width:0; }
  .section-count{ font-size:11px; color:var(--text-sub); font-weight:400; transition:color .15s; }
  .section-right{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .select-all-btn{
    width:24px; height:24px; display:flex; align-items:center; justify-content:center;
    font-size:13px; background:none; border:none; border-radius:6px;
    cursor:pointer; color:var(--text-sub); padding:0; transition:background-color .15s, color .15s;
  }
  .select-all-btn:hover{ background:var(--hover); }
  .select-all-btn.all-checked{ color:#fff; }
  .section-chev{ font-size:10px; color:var(--text-sub); transition:transform .15s; flex-shrink:0; }
  .section.collapsed .section-chev{ transform:rotate(-90deg); }
  .section-chev.rotated{ transform:rotate(-90deg); }
  .section-body{ padding:0 10px 8px; }
  .section.collapsed .section-body{ display:none; }

  .phase-tag{ font-size:9.5px; padding:1px 7px; border-radius:20px; font-weight:500; background:var(--prep-bg); color:var(--prep-text); transition:background-color .15s, color .15s; cursor:pointer; }
  .phase-tag:hover{ box-shadow:inset 0 0 0 1px currentColor; }
  .opt-badge{ font-size:9px; padding:1px 6px; border-radius:20px; background:#FAEEDA; color:#854F0B; font-weight:500; }

  .item-wrap{ padding:3px 0; }
  .item{ display:flex; align-items:flex-start; gap:6px; font-size:13px; }
  .item input[type="checkbox"]{ margin-top:2px; width:15px; height:15px; flex-shrink:0; cursor:pointer; accent-color:var(--accent); }
  .item label{ cursor:pointer; flex:1; }
  .item.checked label{ color:var(--text-sub); text-decoration:line-through; }
  .item.excluded{ opacity:.45; }
  .item.excluded label{ text-decoration:line-through; }
  .item.excluded input[type="checkbox"]{ pointer-events:none; }
  .item-wrap.item-hidden{ display:none; }

  .excluded-badge{
    display:none; width:24px; height:24px; align-items:center; justify-content:center;
    font-size:12px; color:var(--text-sub); background:none; border:none; border-radius:6px;
    cursor:pointer; flex-shrink:0; padding:0; transition:background-color .15s;
  }
  .excluded-badge:hover{ background:var(--hover); }

  .memo-btn, .excl-btn, .link-btn{
    flex-shrink:0; font-size:10.5px; background:none; border:none; border-radius:5px;
    cursor:pointer; color:var(--text-sub); white-space:nowrap; margin-top:1px; transition:background-color .15s;
  }
  .link-btn{ width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0; font-size:12px; }
  .link-btn:hover{ background:var(--hover); color:var(--accent); }
  .memo-btn{ width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0; font-size:12px; }
  .memo-btn:hover, .excl-btn:hover{ background:var(--hover); }
  .memo-btn.has-memo{ background:#EEEDFE; color:#3C3489; }
  .excl-btn{ width:20px; height:20px; display:flex; align-items:center; justify-content:center; padding:0; font-size:12px; }

  .memo-input{
    display:none; width:calc(100% - 19px); margin:4px 0 0 19px; padding:4px 8px; font-size:11.5px;
    border:1px solid var(--border); border-radius:5px; background:var(--bg); color:var(--text);
    font-family:inherit; resize:none; overflow:hidden; line-height:1.5;
  }
  .item-wrap.memo-open .memo-input{ display:block; }
  .memo-input:focus{ outline:none; border-color:var(--accent); }

  .memo-preview{
    display:none; margin:4px 0 0 19px; padding:3px 8px; font-size:11.5px; color:var(--text-sub);
    cursor:pointer; border-radius:5px; background:var(--bg); border:1px dashed var(--border);
    white-space:pre-wrap; line-height:1.5;
  }
  .memo-preview:hover, .memo-preview:focus{ background:var(--hover); outline:none; }
  .item-wrap.has-memo:not(.memo-open) .memo-preview{ display:block; }

  .footer-actions{ display:flex; justify-content:center; gap:6px; margin-top:12px; }
  .reset-btn{ padding:6px 12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-size:12px; cursor:pointer; color:#B23B4A; }
  .reset-btn:hover{ background:#FBE4E6; border-color:#F0B8C0; }
  .history-btn{ padding:6px 12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-size:12px; cursor:pointer; color:var(--text-sub); }
  .history-btn:hover{ background:var(--hover); }

  #historyPanel{ display:none; margin-top:8px; }
  #historyPanel.open{ display:block; }
  .history-item{ background:var(--card); border:1px solid var(--border); border-radius:5px; padding:8px 10px; margin-bottom:5px; }
  .history-item .hi-top{ display:flex; justify-content:space-between; align-items:center; font-size:12.5px; font-weight:600; margin-bottom:3px; gap:8px; }
  .history-item .hi-date{ font-size:10.5px; color:var(--text-sub); margin-top:2px; }
  .history-item .hi-score{ font-size:11.5px; color:var(--text-sub); font-weight:400; }
  .hi-clickable{ cursor:pointer; display:flex; align-items:center; gap:4px; min-width:0; }
  .hi-clickable:hover{ text-decoration:underline; }
  .hi-expand-chev{ font-size:9px; color:var(--text-sub); transition:transform .15s; }
  .hi-expand-chev.rotated{ transform:rotate(-90deg); }
  .hi-top-right{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .hi-del-btn, .hi-edit-btn{ width:20px; height:20px; display:flex; align-items:center; justify-content:center; border:none; background:none; border-radius:5px; cursor:pointer; font-size:11px; color:var(--text-sub); }
  .hi-del-btn:hover{ background:#FBE4E6; }
  .hi-edit-btn:hover{ background:var(--hover); }
  .hi-detail{ margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); }
  .hi-section{ margin-bottom:6px; }
  .hi-section-title{ font-size:10.5px; font-weight:600; color:var(--text-sub); margin-bottom:3px; }
  .hi-item{ display:flex; gap:6px; font-size:11.5px; padding:1px 0; }
  .hi-item-done{ color:var(--text-sub); }
  .hi-item-memo{ font-size:10.5px; color:var(--text-sub); margin:1px 0 2px 20px; padding:2px 6px; background:var(--bg); border-radius:4px; white-space:pre-wrap; }
  .hi-detail-empty{ font-size:11.5px; color:var(--text-sub); }

  .hi-edit-fields{ display:flex; flex-direction:column; gap:5px; margin-bottom:8px; }
  .hi-edit-fields .hi-edit-row{ display:flex; gap:5px; }
  .hi-edit-input{
    flex:1; min-width:0; padding:5px 8px; font-size:11.5px; border:1px solid var(--border);
    border-radius:5px; background:var(--bg); color:var(--text); font-family:inherit;
  }
  .hi-edit-input:focus{ outline:none; border-color:var(--accent); }
  .hi-edit-items{ max-height:260px; overflow-y:auto; margin-bottom:8px; }
  .hi-edit-section{ margin-bottom:8px; }
  .hi-edit-item{ display:flex; align-items:center; gap:6px; font-size:11.5px; padding:2px 0; }
  .hi-edit-item.hi-edit-item-excluded{ opacity:.4; }
  .hi-edit-item.hi-edit-item-excluded .hi-edit-item-text{ text-decoration:line-through; }
  .hi-edit-item-text{ flex:1; }
  .hi-edit-exclude-btn{
    font-size:10px; background:none; border:none; color:var(--text-sub); cursor:pointer;
    padding:2px 6px; border-radius:20px; flex-shrink:0;
  }
  .hi-edit-exclude-btn:hover{ background:var(--hover); }
  .hi-edit-memo{
    width:calc(100% - 20px); margin:2px 0 4px 20px; padding:3px 7px; font-size:10.5px;
    border:1px solid var(--border); border-radius:4px; background:var(--bg); color:var(--text); font-family:inherit;
  }
  .hi-edit-memo:focus{ outline:none; border-color:var(--accent); }
  .hi-edit-actions{ display:flex; justify-content:flex-end; gap:6px; }
  .hi-edit-save{ padding:5px 12px; border:none; border-radius:5px; background:var(--text); color:#fff; font-size:11.5px; cursor:pointer; }
  .hi-edit-cancel{ padding:5px 12px; border:1px solid var(--border); border-radius:5px; background:var(--card); color:var(--text-sub); font-size:11.5px; cursor:pointer; }
  .history-empty{ font-size:12px; color:var(--text-sub); text-align:center; padding:12px 0; }
  .clear-history{ text-align:center; margin-top:6px; }
  .clear-history button{ font-size:11px; background:none; border:none; color:#993C1D; cursor:pointer; text-decoration:underline; }
  /* ---- 편집 모드 ---- */
  .edit-mode-reset-link{
    display:none; font-size:10.5px; background:none; border:none; color:var(--text-sub);
    cursor:pointer; text-decoration:underline; margin-right:auto;
  }
  body.edit-mode .edit-mode-reset-link{ display:inline; }
  .edit-mode-toggle-btn{
    padding:5px 13px; border:1px solid var(--border); border-radius:8px; background:var(--card);
    font-size:12px; font-weight:500; color:var(--text-sub); cursor:pointer; flex-shrink:0;
  }
  .edit-mode-toggle-btn:hover{ background:var(--hover); }
  .edit-mode-toggle-btn.active{ background:var(--text); color:#fff; border-color:var(--text); }

  .item-edit-row{ display:none; align-items:center; gap:5px; flex-wrap:wrap; margin:4px 0 2px 21px; }
  body.edit-mode .item-edit-row{ display:flex; }
  body.edit-mode .item{ opacity:.55; pointer-events:none; }
  .item-edit-text{
    flex:1; min-width:100px; padding:4px 8px; font-size:12px; border:1px solid var(--border);
    border-radius:5px; background:var(--card); color:var(--text); font-family:inherit;
  }
  .item-edit-opt-label{ font-size:10px; color:var(--text-sub); display:flex; align-items:center; gap:3px; white-space:nowrap; flex-shrink:0; }
  .item-edit-url{
    width:130px; flex-shrink:0; padding:4px 6px; font-size:10.5px; border:1px solid var(--border);
    border-radius:5px; background:var(--card); color:var(--text); font-family:inherit;
  }
  .item-edit-btn{
    width:22px; height:22px; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    border:none; background:var(--hover); border-radius:5px; cursor:pointer; font-size:11px; color:var(--text-sub);
  }
  .item-edit-btn:hover{ background:rgba(55,53,47,0.12); }
  .item-edit-btn.danger:hover{ background:#FBE4E6; color:#B23B4A; }
  .item-edit-btn.text-btn{ width:auto; padding:0 10px; font-size:11px; }

  .chip-toggle-wrap{ display:flex; flex-wrap:wrap; gap:5px; margin:5px 0 0 21px; }
  .blind-chip{
    padding:3px 10px; border-radius:20px; border:1px solid var(--border); background:var(--bg);
    font-size:11.5px; color:var(--text-sub); cursor:pointer; transition:background-color .15s, color .15s, border-color .15s;
  }
  .blind-chip:hover{ background:var(--hover); }
  .blind-chip.on{ font-weight:700; border-color:transparent; }

  .chip-edit-row{ display:none; flex-wrap:wrap; gap:5px; margin:5px 0 0 21px; align-items:center; }
  body.edit-mode .chip-edit-row{ display:flex; }
  .chip-edit-item{
    display:inline-flex; align-items:center; gap:0; background:var(--bg); border:1px solid var(--border);
    border-radius:20px; padding:1px 2px 1px 8px;
  }
  .chip-edit-label{ border:none; background:none; font-size:11px; width:56px; font-family:inherit; color:var(--text); }
  .chip-edit-label:focus{ outline:none; }
  .chip-edit-del{ background:none; border:none; cursor:pointer; color:var(--text-sub); font-size:12px; padding:2px 6px; }
  .chip-edit-del:hover{ color:#B23B4A; }
  .add-chip-input{
    padding:3px 10px; font-size:11px; border:1px dashed var(--border); border-radius:20px;
    background:var(--bg); font-family:inherit; width:130px; color:var(--text);
  }
  .item-edit-row, .section-edit-row, .qc-edit-row, .field-edit-row{ cursor:grab; }
  .item-edit-row:active, .section-edit-row:active, .qc-edit-row:active, .field-edit-row:active{ cursor:grabbing; }
  .item-wrap.dragging, .section.dragging, .qc-assignee-row.dragging, .task-field-row.dragging{ opacity:.35; }
  .item-wrap.drag-over, .section.drag-over, .qc-assignee-row.drag-over, .task-field-row.drag-over{ box-shadow:0 -2px 0 0 var(--accent); }

  .section-edit-row{ display:none; align-items:center; gap:6px; padding:8px 10px; border-top:1px dashed var(--border); background:var(--bg); }
  body.edit-mode .section-edit-row{ display:flex; }
  .section-edit-tag{ width:64px; flex-shrink:0; padding:4px 6px; font-size:11px; border:1px solid var(--border); border-radius:5px; background:var(--card); }
  .section-edit-title{ flex:1; min-width:0; padding:4px 8px; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }

  .add-item-row{ display:none; align-items:center; gap:6px; margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); }
  body.edit-mode .add-item-row{ display:flex; }
  .add-item-input{ flex:1; padding:5px 8px; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }

  .add-section-row{ display:none; align-items:center; gap:6px; margin-top:10px; }
  body.edit-mode .add-section-row{ display:flex; }
  .add-section-row .item-edit-btn{ width:auto; padding:6px 14px; font-size:12px; }
  .add-section-input{ flex:1; padding:6px 10px; font-size:12px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }

  .qc-edit-row{ display:none; align-items:center; gap:6px; width:100%; margin-top:5px; padding-top:5px; border-top:1px dashed var(--border); }
  body.edit-mode .qc-edit-row{ display:flex; }
  body.edit-mode .qc-assignee-row{ flex-wrap:wrap; }
  .qc-edit-label{ flex:1; padding:4px 8px; font-size:11.5px; border:1px solid var(--border); border-radius:5px; background:var(--card); font-family:inherit; }

  .add-qc-cat-row{ display:none; align-items:center; gap:6px; margin-top:4px; }
  body.edit-mode .add-qc-cat-row{ display:flex; }

// 커스텀(새로 추가한) 섹션을 위한 색상 자동 생성 - id 기준으로 고정된 색을 만들어 매번 동일하게 보이도록 함
function hashHue(str){
  let h = 0;
  for (let i = 0; i < str.length; i++){ h = (h * 31 + str.charCodeAt(i)) % 360; }
  return Math.abs(h) % 360;
}
function makeColor(hue){
  return {
    strong: `hsl(${hue} 55% 55%)`,
    bg: `hsl(${hue} 68% 93%)`,
    text: `hsl(${hue} 55% 32%)`
  };
}
function getColor(sec){
  if (sectionColors[sec.id]) return sectionColors[sec.id];
  if (!sec.color) sec.color = makeColor(hashHue(sec.id));
  return sec.color;
}

function applySectionColor(secId, color){
  const secEl = document.getElementById("section-" + secId);
  const head = secEl.querySelector(".section-head");
  const count = document.getElementById("count-" + secId);
  const btn = document.querySelector(`.select-all-btn[data-section="${secId}"]`);
  if (color){
    secEl.style.borderColor = color.strong;
    head.style.backgroundColor = color.bg;
    count.style.color = color.text;
    if (btn){ btn.style.backgroundColor = color.strong; btn.style.borderColor = color.strong; }
  } else {
    secEl.style.borderColor = "";
    head.style.backgroundColor = "";
    count.style.color = "";
    if (btn){ btn.style.backgroundColor = ""; btn.style.borderColor = ""; }
  }
}

function randNameColor(){
  const h = Math.floor(Math.random() * 360);
  const s = 55 + Math.floor(Math.random() * 20);
  const l = 88 + Math.floor(Math.random() * 6);
  const tl = 28 + Math.floor(Math.random() * 12);
  return { bg:`hsl(${h} ${s}% ${l}%)`, text:`hsl(${h} ${s}% ${tl}%)` };
}

function renderChips(catId){
  const list = document.getElementById("chips-" + catId);
  list.innerHTML = state.qcAssignees[catId].map((n, i) =>
    `<span class="chip" style="background:${n.color.bg}; color:${n.color.text};">${n.text}<button data-cat="${catId}" data-idx="${i}" data-action="remove-chip" style="color:inherit;">×</button></span>`
  ).join("");
}

qcWrap.addEventListener("click", (e) => {
  const btn = e.target.closest("button[data-action='remove-chip']");
  if (btn){
    const catId = btn.dataset.cat;
    state.qcAssignees[catId].splice(parseInt(btn.dataset.idx, 10), 1);
    renderChips(catId);
    saveCurrent();
  }
});

qcContainer.addEventListener("compositionstart", (e) => {
  if (e.target.matches(".chip-input")) e.target.dataset.composing = "1";
});
qcContainer.addEventListener("compositionend", (e) => {
  if (e.target.matches(".chip-input")) delete e.target.dataset.composing;
});
qcContainer.addEventListener("keydown", (e) => {
  if (!e.target.matches(".chip-input") || e.target.dataset.composing) return;
  const catId = e.target.dataset.cat;

  if (e.key === "Enter"){
    const name = e.target.value.trim();
    if (name){
      state.qcAssignees[catId].push({ text:name, color:randNameColor() });
      renderChips(catId);
      saveCurrent();
    }
    e.target.value = "";
  }
  if (e.key === "Backspace" && e.target.value === "" && state.qcAssignees[catId].length > 0){
    state.qcAssignees[catId].pop();
    renderChips(catId);
    saveCurrent();
  }
});

function renderQcSummary(){
  const el = document.getElementById("qcSummary");
  const active = qcCategories.filter(c => state.qcAssignees[c.id].length > 0);

    ? active.map(c => `

  el.innerHTML = body + `<span class="qc-edit-hint">편집</span>`;
}

  const linkBtn = item.url ? `<button class="link-btn" data-url="${item.url}" title="링크 새 창에서 열기">📎</button>` : "";
  const chipToggleHtml = item.chips ? `
    <div class="chip-toggle-wrap" data-item-id="${id}">
      ${item.chips.map(c => `<button class="blind-chip" data-item-id="${id}" data-chip-id="${c.id}" data-section="${sec.id}">${c.label}</button>`).join("")}
    </div>` : "";
  const chipEditHtml = item.chips ? `
    <div class="chip-edit-row" data-item-id="${id}">
      ${item.chips.map(c => `
        <span class="chip-edit-item">
          <input type="text" class="chip-edit-label" data-item-id="${id}" data-chip-id="${c.id}" value="${c.label.replace(/"/g,"&quot;")}">
          <button class="chip-edit-del" data-item-id="${id}" data-chip-id="${c.id}" title="삭제">×</button>
        </span>`).join("")}

    </div>` : "";
  wrap.innerHTML = `
    <div class="item" data-id="${id}" data-section="${sec.id}">
      <input type="checkbox" id="chk-${id}">
      <label for="chk-${id}">${item.t} ${optBadge}</label>
      ${linkBtn}
      <button class="memo-btn" data-action="toggle-memo" data-id="${id}" title="메모">✎</button>
      <button class="excl-btn" data-action="exclude" data-id="${id}" title="제외">×</button>
    </div>

    <textarea class="memo-input" data-memo-id="${id}" placeholder="메모 작성 후 Enter, 줄바꿈은 Shift+Enter" rows="1"></textarea>
    <span class="memo-preview" data-memo-id="${id}" tabindex="0"></span>

      <label class="item-edit-opt-label"><input type="checkbox" class="item-edit-opt" data-item-id="${id}" data-section="${sec.id}" ${item.opt?"checked":""}> 옵션</label>

  return wrap;
}

function renderSection(sec){
  const secEl = document.createElement("div");
  secEl.className = "section phase-" + (sec.tagClass || "prep");
  secEl.id = "section-" + sec.id;
  secEl.dataset.section = sec.id;

  const head = document.createElement("div");
  head.className = "section-head";
  head.innerHTML = `
    <div class="section-title">
      <span class="phase-tag" id="tag-${sec.id}" title="클릭하면 같은 카테고리 전체 펼치기/접기">${sec.tag}</span>
      <span id="title-${sec.id}">${sec.title}</span>
      <span class="section-count" id="count-${sec.id}"></span>
    </div>
    <div class="section-right">
      <button class="excluded-badge" id="excluded-badge-${sec.id}" data-action="restore-all" data-section="${sec.id}" title="제외된 항목 모두 복원">↺</button>
      <button class="select-all-btn" data-action="select-all" data-section="${sec.id}" title="이 섹션 전체 체크/해제">✓</button>
      <span class="section-chev">▾</span>
    </div>
  `;
  head.addEventListener("click", (e) => {
    if (e.target.closest("button, .phase-tag")) return;
    secEl.classList.toggle("collapsed");
    updateExpandLabel();
  });

  const editRow = document.createElement("div");
  editRow.className = "section-edit-row";
  editRow.draggable = true;
  editRow.dataset.section = sec.id;
  editRow.innerHTML = `
    <input type="text" class="section-edit-tag" data-section="${sec.id}" value="${sec.tag}" placeholder="배지">
    <input type="text" class="section-edit-title" data-section="${sec.id}" value="${sec.title.replace(/"/g,"&quot;")}" placeholder="섹션 제목">
    <button class="item-edit-btn danger text-btn" data-edit-action="sec-del" data-section="${sec.id}" title="섹션 삭제">삭제</button>
  `;

  const body = document.createElement("div");
  body.className = "section-body";
  body.id = "body-" + sec.id;
  sec.items.forEach((item, i) => body.appendChild(renderItem(sec, item, i)));

  const addItemRow = document.createElement("div");
  addItemRow.className = "add-item-row";
  addItemRow.innerHTML = `<input type="text" class="add-item-input" data-section="${sec.id}" placeholder="새 항목 입력 후 Enter"><button class="item-edit-btn" data-edit-action="item-add" data-section="${sec.id}" title="추가">＋</button>`;
  body.appendChild(addItemRow);

  secEl.appendChild(head);
  secEl.appendChild(editRow);
  secEl.appendChild(body);
  container.appendChild(secEl);
}

// ---- 편집 모드: 바를 드래그해서 순서 변경 (부드러운 이동 애니메이션 포함) ----
function flipAnimate(parentEl, mutateFn){
  const firstRects = new Map();
  [...parentEl.children].forEach(el => firstRects.set(el, el.getBoundingClientRect()));

  mutateFn();

  [...parentEl.children].forEach(el => {
    const first = firstRects.get(el);
    if (!first) return;
    const last = el.getBoundingClientRect();
    const dy = first.top - last.top;
    if (Math.abs(dy) < 1) return;
    el.style.transition = "none";
    el.style.transform = `translateY(${dy}px)`;
    requestAnimationFrame(() => {
      el.style.transition = "transform .22s ease";
      el.style.transform = "";
      el.addEventListener("transitionend", () => { el.style.transition = ""; }, { once:true });
    });
  });
}

const dragState = { type:null, id:null, section:null };

// 입력창(input/select/textarea) 안에서 시작한 마우스다운은 텍스트 선택이 되도록 드래그 비활성화,
// 그 외 바의 여백을 잡았을 때만 드래그 가능하게 전환
document.addEventListener("mousedown", (e) => {
  const row = e.target.closest(".item-edit-row, .section-edit-row, .qc-edit-row, .field-edit-row");
  if (!row) return;
  const isFormEl = e.target.matches("input, select, textarea, button");
  row.draggable = !isFormEl;
});
document.addEventListener("mouseup", () => {
  document.querySelectorAll(".item-edit-row, .section-edit-row, .qc-edit-row, .field-edit-row").forEach(row => {
    row.draggable = true;
  });
});

document.addEventListener("dragstart", (e) => {
  if (!editMode) return;
  if (e.target.closest("button, input, select, textarea")){ e.preventDefault(); return; }
  const itemRow = e.target.closest(".item-edit-row");
  const secRow = e.target.closest(".section-edit-row");
  const qcRow = e.target.closest(".qc-edit-row");
  const fieldRow = e.target.closest(".field-edit-row");
  if (itemRow){
    dragState.type = "item";
    dragState.id = itemRow.dataset.itemId;
    dragState.section = itemRow.dataset.section;
    itemRow.closest(".item-wrap").classList.add("dragging");
  } else if (secRow){
    dragState.type = "section";
    dragState.id = secRow.dataset.section;
    secRow.closest(".section").classList.add("dragging");
  } else if (qcRow){
    dragState.type = "qc-cat";
    dragState.id = qcRow.dataset.cat;
    qcRow.closest(".qc-assignee-row").classList.add("dragging");
  } else if (fieldRow){
    dragState.type = "task-field";
    dragState.id = fieldRow.dataset.fieldId;
    fieldRow.closest(".task-field-row").classList.add("dragging");
  } else {
    return;
  }
  e.dataTransfer.effectAllowed = "move";
});

document.addEventListener("dragend", () => {
  document.querySelectorAll(".dragging").forEach(el => el.classList.remove("dragging"));
  document.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
  dragState.type = null;
});

function markDragOver(el){
  document.querySelectorAll(".drag-over").forEach(x => x.classList.remove("drag-over"));
  el.classList.add("drag-over");
}

document.addEventListener("dragover", (e) => {
  if (!dragState.type) return;
  if (dragState.type === "item"){
    const over = e.target.closest(".item-wrap");
    if (over && over.dataset.section === dragState.section){ e.preventDefault(); markDragOver(over); }
  } else if (dragState.type === "section"){
    const over = e.target.closest(".section:not(.meta-section)");
    if (over){ e.preventDefault(); markDragOver(over); }
  } else if (dragState.type === "qc-cat"){
    const over = e.target.closest(".qc-assignee-row");
    if (over){ e.preventDefault(); markDragOver(over); }
  } else if (dragState.type === "task-field"){
    const over = e.target.closest(".task-field-row");
    if (over){ e.preventDefault(); markDragOver(over); }
  }
});

document.addEventListener("drop", (e) => {
  if (dragState.type === "item"){
    const over = e.target.closest(".item-wrap");
    if (!over || over.dataset.section !== dragState.section || over.dataset.itemId === dragState.id) return;
    e.preventDefault();
    const sec = sections.find(s => s.id === dragState.section);
    const fromIdx = sec.items.findIndex(it => it.id === dragState.id);
    if (fromIdx === -1) return;
    const [moved] = sec.items.splice(fromIdx, 1);
    const toIdx = sec.items.findIndex(it => it.id === over.dataset.itemId);
    sec.items.splice(toIdx, 0, moved);
    saveTemplate();
    const body = document.getElementById("body-" + dragState.section);
    const wrapA = body.querySelector(`.item-wrap[data-item-id="${dragState.id}"]`);
    flipAnimate(body, () => { body.insertBefore(wrapA, over); });
  } else if (dragState.type === "section"){
    const over = e.target.closest(".section:not(.meta-section)");
    if (!over || over.dataset.section === dragState.id) return;
    e.preventDefault();
    const fromIdx = sections.findIndex(s => s.id === dragState.id);
    if (fromIdx === -1) return;
    const [moved] = sections.splice(fromIdx, 1);
    const toIdx = sections.findIndex(s => s.id === over.dataset.section);
    sections.splice(toIdx, 0, moved);
    saveTemplate();
    const secElA = document.getElementById("section-" + dragState.id);
    flipAnimate(container, () => { container.insertBefore(secElA, over); });
  } else if (dragState.type === "qc-cat"){
    const over = e.target.closest(".qc-assignee-row");
    if (!over || over.dataset.cat === dragState.id) return;
    e.preventDefault();
    const fromIdx = qcCategories.findIndex(c => c.id === dragState.id);
    if (fromIdx === -1) return;
    const [moved] = qcCategories.splice(fromIdx, 1);
    const toIdx = qcCategories.findIndex(c => c.id === over.dataset.cat);
    qcCategories.splice(toIdx, 0, moved);
    saveTemplate();
    const rowA = qcWrap.querySelector(`.qc-assignee-row[data-cat="${dragState.id}"]`);
    flipAnimate(qcWrap, () => { qcWrap.insertBefore(rowA, over); });
  } else if (dragState.type === "task-field"){
    const over = e.target.closest(".task-field-row");
    if (!over || over.dataset.fieldId === dragState.id) return;
    e.preventDefault();
    const fromIdx = taskFields.findIndex(f => f.id === dragState.id);
    if (fromIdx === -1) return;
    const [moved] = taskFields.splice(fromIdx, 1);
    const toIdx = taskFields.findIndex(f => f.id === over.dataset.fieldId);
    taskFields.splice(toIdx, 0, moved);
    saveTemplate();
    const wrap = document.getElementById("taskFieldsWrap");
    const rowA = wrap.querySelector(`.task-field-row[data-field-id="${dragState.id}"]`);
    flipAnimate(wrap, () => { wrap.insertBefore(rowA, over); });
  }
});

function openMemoEdit(el){
  const wrap = el.closest(".item-wrap");
  wrap.classList.add("memo-open");
  const input = wrap.querySelector(".memo-input");
  input.focus();
  input.setSelectionRange(input.value.length, input.value.length);
  input.style.height = "auto";
  input.style.height = input.scrollHeight + "px";
}

container.addEventListener("click", (e) => {
  const chip = e.target.closest(".blind-chip");
  if (chip){
    const itemId = chip.dataset.itemId;
    const chipId = chip.dataset.chipId;
    const secId = chip.dataset.section;
    const key = itemId + "::" + chipId;
    const isOn = chip.classList.toggle("on");
    if (isOn){
      const sec = sections.find(s => s.id === secId);
      const c = getColor(sec);
      chip.style.background = c.bg;
      chip.style.color = c.text;
    } else {
      chip.style.background = "";
      chip.style.color = "";
    }
    if (!state.chipStates) state.chipStates = {};
    state.chipStates[key] = isOn;
    saveCurrent();
    return;
  }

  const linkBtn = e.target.closest(".link-btn");
  if (linkBtn){
    window.open(linkBtn.dataset.url, "_blank", "noopener,noreferrer");
    return;
  }

  const preview = e.target.closest(".memo-preview");
  if (preview){
    openMemoEdit(preview);
    return;
  }

  const btn = e.target.closest("button");
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === "exclude"){
    const id = btn.dataset.id;
    const row = container.querySelector(`.item[data-id="${id}"]`);
    const wrap = row.closest(".item-wrap");
    const isExcluded = row.classList.toggle("excluded");
    const cb = row.querySelector("input[type=checkbox]");
    if (isExcluded){
      cb.checked = false;
      wrap.classList.add("item-hidden");
    } else {
      wrap.classList.remove("item-hidden");
    }
    updateExcludedBadge(row.dataset.section);
    updateProgress();
    saveCurrent();
  }

  if (action === "restore-all"){
    const sectionId = btn.dataset.section;
    container.querySelectorAll(`.item[data-section="${sectionId}"].excluded`).forEach(row => {
      row.classList.remove("excluded");
      row.closest(".item-wrap").classList.remove("item-hidden");
    });
    updateExcludedBadge(sectionId);
    updateProgress();
    saveCurrent();
  }

  if (action === "toggle-memo"){
    const wrap = btn.closest(".item-wrap");
    wrap.classList.toggle("memo-open");
    if (wrap.classList.contains("memo-open")){
      const ta = wrap.querySelector(".memo-input");
      ta.focus();
      ta.style.height = "auto";
      ta.style.height = ta.scrollHeight + "px";
    }
  }

  if (action === "select-all"){
    const sectionId = btn.dataset.section;
    const rows = [...container.querySelectorAll(`.item[data-section="${sectionId}"]`)].filter(r => !r.classList.contains("excluded"));
    const allChecked = rows.every(r => r.querySelector("input[type=checkbox]").checked);
    rows.forEach(r => { r.querySelector("input[type=checkbox]").checked = !allChecked; });
    updateProgress();
    saveCurrent();
  }
});

container.addEventListener("change", (e) => {
  if (e.target.matches('input[type="checkbox"]')){
    updateProgress();
    saveCurrent();
  }
});
container.addEventListener("input", (e) => {
  if (e.target.matches(".memo-input")){
    const ta = e.target;
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";

    const id = ta.dataset.memoId;
    const wrap = ta.closest(".item-wrap");
    const memoBtn = container.querySelector(`.memo-btn[data-id="${id}"]`);
    const preview = wrap.querySelector(".memo-preview");
    const val = ta.value;
    const hasMemo = val.trim().length > 0;
    if (memoBtn) memoBtn.classList.toggle("has-memo", hasMemo);
    wrap.classList.toggle("has-memo", hasMemo);
    if (preview) preview.textContent = val.length > 120 ? val.slice(0, 120) + "…" : val;
    saveCurrent();
  }
});
container.addEventListener("compositionstart", (e) => {
  if (e.target.matches(".memo-input")) e.target.dataset.composing = "1";
});
container.addEventListener("compositionend", (e) => {
  if (e.target.matches(".memo-input")) delete e.target.dataset.composing;
});
container.addEventListener("keydown", (e) => {
  if (e.target.matches(".memo-preview") && e.key === "Enter"){
    e.preventDefault();
    openMemoEdit(e.target);
    return;
  }
  if (!e.target.matches(".memo-input")) return;
  const ta = e.target;

  if ((e.key === "Enter" || e.keyCode === 13) && !e.shiftKey){
    e.preventDefault();
    if (e.target.dataset.composing) return;
    const wrap = ta.closest(".item-wrap");
    const hasMemo = ta.value.trim().length > 0;
    wrap.classList.remove("memo-open");
    ta.blur();
    if (hasMemo){
      wrap.querySelector(".memo-preview").focus();
    }
    saveCurrent();
    return;
  }

  if (e.key === " "){
    const pos = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf("\n", pos - 1) + 1;
    const currentLine = ta.value.slice(lineStart, pos);
    if (currentLine === "-"){
      e.preventDefault();
      ta.value = ta.value.slice(0, lineStart) + "• " + ta.value.slice(pos);
      const newPos = lineStart + 2;
      ta.setSelectionRange(newPos, newPos);
      ta.dispatchEvent(new Event("input", { bubbles:true }));
    }
  }
});

  document.getElementById("metaTitle").textContent = name ? `📋 ${name}` : "📋 과업 정보 & QC 담당자";
}

document.getElementById("taskFieldsWrap").addEventListener("input", (e) => {

});
document.getElementById("taskFieldsWrap").addEventListener("change", (e) => {

// ---- 전역 컨트롤 ----
document.getElementById("globalCheckBtn").addEventListener("click", () => {
  const rows = [...container.querySelectorAll(".item")].filter(r => !r.classList.contains("excluded"));
  const allChecked = rows.length > 0 && rows.every(r => r.querySelector("input[type=checkbox]").checked);
  rows.forEach(r => { r.querySelector("input[type=checkbox]").checked = !allChecked; });
  updateProgress();
  saveCurrent();
});

document.getElementById("expandAllBtn").addEventListener("click", () => {
  const targets = document.querySelectorAll(".section:not(.meta-section)");
  const anyCollapsed = [...targets].some(s => s.classList.contains("collapsed"));
  targets.forEach(s => s.classList.toggle("collapsed", !anyCollapsed));
  updateExpandLabel();
});

document.getElementById("metaHead").addEventListener("click", () => {
  document.getElementById("metaSection").classList.toggle("collapsed");
});

function updateExpandLabel(){
  const anyCollapsed = [...document.querySelectorAll(".section:not(.meta-section)")].some(s => s.classList.contains("collapsed"));
  document.getElementById("expandAllIcon").classList.toggle("rotated", anyCollapsed);
}

document.addEventListener("click", (e) => {
  const tag = e.target.closest(".phase-tag");
  if (!tag) return;
  const tagText = tag.textContent.trim();
  const matching = sections.filter(s => s.tag === tagText);
  if (matching.length === 0) return;
  const anyExpanded = matching.some(s => {
    const el = document.getElementById("section-" + s.id);
    return el && !el.classList.contains("collapsed");
  });
  matching.forEach(s => {
    const el = document.getElementById("section-" + s.id);
    if (el) el.classList.toggle("collapsed", anyExpanded);
  });
  updateExpandLabel();
});

function updateExcludedBadge(sectionId){
  const badge = document.getElementById("excluded-badge-" + sectionId);
  if (!badge) return;
  const excludedCount = container.querySelectorAll(`.item[data-section="${sectionId}"].excluded`).length;
  badge.style.display = excludedCount === 0 ? "none" : "flex";
}

function updateProgress(){
  const rows = container.querySelectorAll(".item");
  let total = 0, checked = 0;
  rows.forEach(row => {
    if (row.classList.contains("excluded")) return;
    total++;
    const cb = row.querySelector("input[type=checkbox]");
    if (cb.checked) checked++;
    row.classList.toggle("checked", cb.checked);
  });
  document.getElementById("progressText").textContent = `${checked} / ${total}`;
  document.getElementById("progressFill").style.width = total ? (checked / total * 100) + "%" : "0%";

  const globalBtn = document.getElementById("globalCheckBtn");
  const allDone = total > 0 && checked === total;
  globalBtn.classList.toggle("active", allDone);

  document.body.classList.toggle("all-complete", allDone);
  document.getElementById("completeBanner").classList.toggle("show", allDone);

  sections.forEach(sec => {
    const secRows = [...container.querySelectorAll(`.item[data-section="${sec.id}"]`)].filter(r => !r.classList.contains("excluded"));
    const secChecked = secRows.filter(r => r.querySelector("input[type=checkbox]").checked);
    document.getElementById(`count-${sec.id}`).textContent = `${secChecked.length}/${secRows.length}`;
    const selBtn = document.querySelector(`.select-all-btn[data-section="${sec.id}"]`);
    const secDone = secRows.length > 0 && secChecked.length === secRows.length;
    if (selBtn) selBtn.classList.toggle("all-checked", secDone);

    const tagEl = document.getElementById(`tag-${sec.id}`);
    if (tagEl){
      if (secChecked.length > 0){
        tagEl.style.background = getColor(sec).bg;
        tagEl.style.color = getColor(sec).text;
      } else {
        tagEl.style.background = "";
        tagEl.style.color = "";
      }
    }

    if (allDone){
      applySectionColor(sec.id, successColor);
    } else if (secDone){
      applySectionColor(sec.id, getColor(sec));
    } else {
      applySectionColor(sec.id, null);
    }
  });
}

function saveCurrent(){
  const data = {
    taskName: document.getElementById("taskName").value,
    fields:{},
    qcAssignees: state.qcAssignees,
    chipStates: state.chipStates,
    qcLocked: document.getElementById("qcSummary").style.display === "flex",
    checked:{}, excluded:{}, memos:{}
  };
  taskFields.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) data.fields[f.id] = el.value;
  });
  container.querySelectorAll(".item").forEach(row => {
    const id = row.dataset.id;
    data.checked[id] = row.querySelector("input[type=checkbox]").checked;
    data.excluded[id] = row.classList.contains("excluded");
  });
  container.querySelectorAll(".memo-input").forEach(inp => {
    if (inp.value) data.memos[inp.dataset.memoId] = inp.value;
  });
  localStorage.setItem(CURRENT_KEY, JSON.stringify(data));
}

function loadCurrent(){
  try{
    const data = JSON.parse(localStorage.getItem(CURRENT_KEY) || "{}");
    if (data.taskName) document.getElementById("taskName").value = data.taskName;
    taskFields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el) return;
      if (data.fields && data.fields[f.id] !== undefined) el.value = data.fields[f.id];
      else if (data[f.id] !== undefined) el.value = data[f.id]; // 이전 버전 저장분 호환
    });

    if (data.qcAssignees){
      qcCategories.forEach(cat => {
        state.qcAssignees[cat.id] = data.qcAssignees[cat.id] || [];
        renderChips(cat.id);
      });
    }
    if (data.qcLocked){
      renderQcSummary();
      document.getElementById("qcAssignees").style.display = "none";
      document.getElementById("qcConfirmBtn").style.display = "none";
      document.getElementById("qcSummary").style.display = "flex";
    }

    if (data.chipStates){
      state.chipStates = data.chipStates;
      Object.keys(data.chipStates).forEach(key => {
        if (!data.chipStates[key]) return;
        const [itemId, chipId] = key.split("::");
        const btn = document.querySelector(`.blind-chip[data-item-id="${itemId}"][data-chip-id="${chipId}"]`);
        if (btn){
          btn.classList.add("on");
          const secId = btn.dataset.section;
          const sec = sections.find(s => s.id === secId);
          if (sec){
            const c = getColor(sec);
            btn.style.background = c.bg;
            btn.style.color = c.text;
          }
        }
      });
    }

    if (data.checked){
      Object.keys(data.checked).forEach(id => {
        const cb = document.getElementById("chk-" + id);
        if (cb && data.checked[id]) cb.checked = true;
      });
    }
    if (data.excluded){
      Object.keys(data.excluded).forEach(id => {
        if (!data.excluded[id]) return;
        const row = container.querySelector(`.item[data-id="${id}"]`);
        if (row){
          row.classList.add("excluded");
          row.closest(".item-wrap").classList.add("item-hidden");
        }
      });
      sections.forEach(sec => updateExcludedBadge(sec.id));
    }
    if (data.memos){
      Object.keys(data.memos).forEach(id => {
        const inp = container.querySelector(`.memo-input[data-memo-id="${id}"]`);
        if (inp){
          const val = data.memos[id];
          inp.value = val;
          const wrap = inp.closest(".item-wrap");
          const memoBtn = container.querySelector(`.memo-btn[data-id="${id}"]`);
          const preview = wrap.querySelector(".memo-preview");
          if (memoBtn) memoBtn.classList.add("has-memo");
          wrap.classList.add("has-memo");
          if (preview) preview.textContent = val.length > 120 ? val.slice(0, 120) + "…" : val;
        }
      });
    }
  }catch(e){}
}


// ---- 기록 ----
function getHistory(){
  try{ return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }catch(e){ return []; }
}
function saveHistory(list){ localStorage.setItem(HISTORY_KEY, JSON.stringify(list)); }

function buildHistoryDetail(h){
  if (!h.items) return `<div class="hi-detail-empty">이 기록엔 세부 항목이 저장되어 있지 않아요 (예전 버전에서 저장됨)</div>`;
  return sections.map(sec => {
    const rows = sec.items.map((item, i) => {
      const id = item.id;
      const snap = h.items[id];
      if (!snap || snap.excluded) return "";
      const mark = snap.checked ? "☑" : "☐";
      const memo = h.memos && h.memos[id] ? `<div class="hi-item-memo">${h.memos[id]}</div>` : "";
      return `<div class="hi-item ${snap.checked ? "hi-item-done" : ""}"><span>${mark}</span><span>${item.t}</span></div>${memo}`;
    }).join("");
    if (!rows) return "";
    return `<div class="hi-section"><div class="hi-section-title">${sec.tag} · ${sec.title}</div>${rows}</div>`;
  }).join("");
}

function buildHistoryEditForm(h, idx){
  const itemsHtml = h.items ? sections.map(sec => {
    const rows = sec.items.map((item, i) => {
      const id = item.id;
      const snap = h.items[id] || { checked:false, excluded:false };
      const memoVal = (h.memos && h.memos[id]) || "";
      return `
        <div class="hi-edit-item ${snap.excluded ? "hi-edit-item-excluded" : ""}" data-item-row="${id}">
          <input type="checkbox" class="hi-edit-check" data-item-id="${id}" ${snap.checked ? "checked" : ""} ${snap.excluded ? "disabled" : ""}>
          <span class="hi-edit-item-text">${item.t}</span>
          <button class="hi-edit-exclude-btn" data-item-id="${id}" data-excluded="${snap.excluded ? "1" : "0"}">${snap.excluded ? "복원" : "제외"}</button>
        </div>
        <input type="text" class="hi-edit-memo" data-item-id="${id}" value="${memoVal.replace(/"/g,"&quot;")}" placeholder="메모">
      `;
    }).join("");
    return `<div class="hi-edit-section"><div class="hi-section-title">${sec.tag} · ${sec.title}</div>${rows}</div>`;
  }).join("") : `<div class="hi-detail-empty">이 기록엔 세부 항목이 없어요</div>`;

  const fieldsFormHtml = taskFields.map(f => {
    const val = (h.fields && h.fields[f.id] !== undefined) ? h.fields[f.id] : (h[f.id] || "");
    return `<input type="${f.type}" class="hi-edit-input" data-field="${f.id}" value="${String(val).replace(/"/g,"&quot;")}" placeholder="${f.label}">`;
  }).join("");

  return `
    <div class="hi-edit-fields">
      <input type="text" class="hi-edit-input" data-field="taskName" value="${(h.taskName||"").replace(/"/g,"&quot;")}" placeholder="과업명">
      <div class="hi-edit-row" style="flex-wrap:wrap;">${fieldsFormHtml}</div>
    </div>
    <div class="hi-edit-items">${itemsHtml}</div>
    <div class="hi-edit-actions">
      <button class="hi-edit-save" data-idx="${idx}">저장</button>
      <button class="hi-edit-cancel">취소</button>
    </div>
  `;
}

function renderHistory(){
  const panel = document.getElementById("historyPanel");
  const list = getHistory();
  if (list.length === 0){
    panel.innerHTML = `<div class="history-empty">아직 저장된 기록이 없어요. "완료 · 기록 저장하고 초기화"를 누르면 여기 쌓여요.</div>`;
    return;
  }
  panel.innerHTML = list.map((h, idx) => {
    const metaParts = [];
    if (h.fields){
      Object.keys(h.fields).forEach(fid => {
        const val = h.fields[fid];
        if (!val) return;
        const label = (h.fieldLabels && h.fieldLabels[fid]) || fid;
        metaParts.push(`${label} ${val}`);
      });
    } else {
      // 이전 버전 기록 호환
      if (h.taskOwner) metaParts.push(`담당자 ${h.taskOwner}`);
      if (h.taskRate) metaParts.push(`단가 ${h.taskRate}`);
      if (h.taskDeadline) metaParts.push(`서류 마감일 ${h.taskDeadline}`);
      if (h.taskDelivery) metaParts.push(`납품일 ${h.taskDelivery}`);
    }
    const meta = metaParts.length ? `<div class="hi-date">${metaParts.join(" · ")}</div>` : "";

    const qcParts = [];
    if (h.qcAssignees){
      qcCategories.forEach(cat => {
        const names = h.qcAssignees[cat.id];
        if (names && names.length) qcParts.push(`${cat.label} ${names.map(n => n.text).join(",")}`);
      });
    }
    const qcMeta = qcParts.length ? `<div class="hi-date">${qcParts.join(" · ")}</div>` : "";

    return `
    <div class="history-item">
      <div class="hi-top">
        <span class="hi-clickable" data-idx="${idx}">${h.taskName || "(이름 없는 과업)"} <span class="hi-expand-chev">▾</span></span>
        <span class="hi-top-right">
          <span class="hi-score">${h.checked}/${h.total} 완료</span>
          <button class="hi-edit-btn" data-idx="${idx}" title="이 기록 수정">✎</button>
          <button class="hi-del-btn" data-idx="${idx}" title="이 기록 삭제">🗑</button>
        </span>
      </div>
      <div class="hi-date">${h.date}</div>
      ${meta}
      ${qcMeta}
      <div class="hi-detail" id="hi-detail-${idx}" style="display:none;">${buildHistoryDetail(h)}</div>
    </div>
  `;
  }).join("") + `<div class="clear-history"><button id="clearHistoryBtn">전체 기록 삭제</button></div>`;

  panel.querySelectorAll(".hi-clickable").forEach(el => {
    el.addEventListener("click", () => {
      const idx = el.dataset.idx;
      const detail = document.getElementById("hi-detail-" + idx);
      const isOpen = detail.style.display === "block";
      detail.style.display = isOpen ? "none" : "block";
      el.querySelector(".hi-expand-chev").classList.toggle("rotated", !isOpen);
    });
  });

  panel.querySelectorAll(".hi-del-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx, 10);
      const list2 = getHistory();
      list2.splice(idx, 1);
      saveHistory(list2);
      renderHistory();
    });
  });

  panel.querySelectorAll(".hi-edit-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx, 10);
      const h = getHistory()[idx];
      const detail = document.getElementById("hi-detail-" + idx);
      detail.innerHTML = buildHistoryEditForm(h, idx);
      detail.style.display = "block";
    });
  });

  const clearBtn = document.getElementById("clearHistoryBtn");
  if (clearBtn){
    clearBtn.addEventListener("click", () => {
      if (confirm("저장된 과업 기록을 전부 삭제할까요?")){
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
      }
    });
  }
}

document.getElementById("historyBtn").addEventListener("click", () => {
  const panel = document.getElementById("historyPanel");
  panel.classList.toggle("open");
  if (panel.classList.contains("open")) renderHistory();
});

document.getElementById("historyPanel").addEventListener("click", (e) => {
  const exBtn = e.target.closest(".hi-edit-exclude-btn");
  if (exBtn){
    const willExclude = exBtn.dataset.excluded === "0";
    exBtn.dataset.excluded = willExclude ? "1" : "0";
    exBtn.textContent = willExclude ? "복원" : "제외";
    const row = exBtn.closest(".hi-edit-item");
    row.classList.toggle("hi-edit-item-excluded", willExclude);
    const cb = row.querySelector(".hi-edit-check");
    cb.disabled = willExclude;
    if (willExclude) cb.checked = false;
    return;
  }

  const cancelBtn = e.target.closest(".hi-edit-cancel");
  if (cancelBtn){
    renderHistory();
    return;
  }

  const saveBtn = e.target.closest(".hi-edit-save");
  if (saveBtn){
    const idx = parseInt(saveBtn.dataset.idx, 10);
    const formRoot = saveBtn.closest(".hi-detail");
    const list2 = getHistory();
    const h = list2[idx];

    formRoot.querySelectorAll(".hi-edit-input").forEach(inp => {
      if (inp.dataset.field === "taskName") h.taskName = inp.value;
      else { if (!h.fields) h.fields = {}; h.fields[inp.dataset.field] = inp.value; }
    });

    if (h.items){
      let total = 0, checked = 0;
      formRoot.querySelectorAll(".hi-edit-item").forEach(row => {
        const id = row.dataset.itemRow;
        const cb = row.querySelector(".hi-edit-check");
        const excludedNow = row.classList.contains("hi-edit-item-excluded");
        h.items[id] = { checked: cb.checked, excluded: excludedNow };
        if (!excludedNow){ total++; if (cb.checked) checked++; }
      });
      h.total = total;
      h.checked = checked;
    }
    if (!h.memos) h.memos = {};
    formRoot.querySelectorAll(".hi-edit-memo").forEach(inp => {
      if (inp.value.trim()) h.memos[inp.dataset.itemId] = inp.value;
      else delete h.memos[inp.dataset.itemId];
    });

    saveHistory(list2);
    renderHistory();
  }
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("현재 체크리스트를 '지난 기록'에 저장하고 새 과업을 위해 초기화할까요?")) return;

  const rows = container.querySelectorAll(".item");
  let total = 0, checked = 0;
  rows.forEach(row => {
    if (row.classList.contains("excluded")) return;
    total++;
    if (row.querySelector("input[type=checkbox]").checked) checked++;
  });

  const itemSnapshot = {};
  container.querySelectorAll(".item").forEach(row => {
    itemSnapshot[row.dataset.id] = {
      checked: row.querySelector("input[type=checkbox]").checked,
      excluded: row.classList.contains("excluded")
    };
  });
  const memoSnapshot = {};
  container.querySelectorAll(".memo-input").forEach(inp => {
    if (inp.value.trim()) memoSnapshot[inp.dataset.memoId] = inp.value;
  });

  const fieldSnapshot = {};
  const fieldLabelSnapshot = {};
  taskFields.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) fieldSnapshot[f.id] = el.value;
    fieldLabelSnapshot[f.id] = f.label;
  });

  const entry = {
    taskName: document.getElementById("taskName").value || "(이름 없는 과업)",
    fields: fieldSnapshot,
    fieldLabels: fieldLabelSnapshot,
    qcAssignees: state.qcAssignees,
    date: new Date().toLocaleString("ko-KR"),
    total, checked,
    items: itemSnapshot,
    memos: memoSnapshot
  };
  const history = getHistory();
  history.unshift(entry);
  saveHistory(history);

  localStorage.removeItem(CURRENT_KEY);
  location.reload();
});

loadCurrent();
updateMetaTitle();
updateProgress();
updateExpandLabel();
</script>
</body>
</html>
